# azure-pipelines.yml
# Validates a PowerShell module and publishes it to the PowerShell Gallery.

trigger:
  tags:
    include:
      - 'v*'

pool:
  vmImage: 'ubuntu-latest'   # pwsh is preinstalled. Use 'windows-latest' for Windows-only modules.

variables:
  - group: powershell-gallery          # Library variable group holding PSGALLERY_API_KEY (secret)
  - name: moduleName
    value: 'BCPowerTools'
  - name: sourceDir
    value: '$(Build.SourcesDirectory)' # Directory that holds BCPowerTools.psd1 / .psm1

stages:
  # ----------------------------------------------------------------------
  - stage: Validate
    displayName: 'Validate module'
    jobs:
      - job: Validate
        steps:
          - pwsh: |
              Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
              Install-Module PSScriptAnalyzer -Force -Scope CurrentUser
            displayName: 'Install tooling'

          - pwsh: |
              Test-ModuleManifest -Path '$(sourceDir)/$(moduleName).psd1'
            displayName: 'Test module manifest'

          - pwsh: |
              $results = Invoke-ScriptAnalyzer -Path '$(sourceDir)' -Recurse -Severity Error
              if ($results) {
              $results | Format-Table -AutoSize
              Write-Host "##vso[task.logissue type=warning]PSScriptAnalyzer found $($results.Count) issue(s)."
  }
  displayName: 'Run PSScriptAnalyzer'

          # Optional: run Pester tests if you have a /tests folder
          # - pwsh: |
          #     Install-Module Pester -Force -Scope CurrentUser
          #     Invoke-Pester -Path './tests' -CI
          #   displayName: 'Run Pester tests'

  # ----------------------------------------------------------------------
  - stage: Publish
    displayName: 'Publish to PowerShell Gallery'
    dependsOn: Validate
    condition: succeeded()
    jobs:
      - deployment: Publish
        environment: 'powershell-gallery'   # Create under Pipelines > Environments; lets you add approvals
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self            # Deployment jobs don't check out the repo by default
                - pwsh: |
                    # Publish-Module -Path needs a DIRECTORY named after the module,
                    # containing <ModuleName>.psd1. Stage the files into one.
                    $staging = Join-Path '$(Agent.TempDirectory)' '$(moduleName)'
                    New-Item -ItemType Directory -Path $staging -Force | Out-Null

                    # Copy module files into the named folder, leaving repo/CI cruft behind.
                    Copy-Item -Path '$(sourceDir)/*' -Destination $staging -Recurse -Force `
                      -Exclude '.git','.github','*.yml','*.yaml','tests','README*','LICENSE*'

                    $data = Import-PowerShellDataFile -Path (Join-Path $staging '$(moduleName).psd1')
                    Write-Host "Publishing $(moduleName) version $($data.ModuleVersion)"

                    # The Gallery rejects duplicate versions, so fail early with a clear message.
                    $existing = Find-Module -Name '$(moduleName)' -RequiredVersion $data.ModuleVersion -ErrorAction SilentlyContinue
                    if ($existing) {
                      throw "$(moduleName) $($data.ModuleVersion) is already published. Bump ModuleVersion in the manifest."
                    }

                    Publish-Module -Path $staging -NuGetApiKey $env:PSGALLERY_API_KEY -Verbose
                  displayName: 'Publish-Module'
                  env:
                    PSGALLERY_API_KEY: $(PSGALLERY_API_KEY)   # Map secret to env (keeps it off the command line)